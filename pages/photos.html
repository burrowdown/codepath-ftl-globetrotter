<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photos — Hells Canyon</title>
    <script src="/components/site-header.js" defer></script>
  </head>
  <body>
    <site-header></site-header>

    <main>
      <section class="gallery">

        <figure>
          <img src="/images/photos/heavens-gate.jpg" alt="View from Heavens Gate Lookout" />
          <figcaption>The view from Heavens Gate Lookout, at 8,429 feet one of the highest accessible points above the canyon.</figcaption>
        </figure>

        <figure>
          <img src="/images/photos/shore-view.jpg" alt="Snake River from the canyon floor" />
          <figcaption>The Snake River seen from the canyon floor, hemmed in by walls that rise over a mile on either side.</figcaption>
        </figure>

        <figure>
          <img src="/images/photos/view-from-boat.jpg" alt="Looking upriver from a jet boat" />
          <figcaption>Looking upriver from a jet boat in the inner gorge — much of this stretch is unreachable by road.</figcaption>
        </figure>

        <figure>
          <img src="/images/photos/boat.jpg" alt="Jet boat on the Snake River" />
          <figcaption>A jet boat navigating the Snake River, the primary commercial access route through the canyon.</figcaption>
        </figure>

        <figure>
          <img src="/images/photos/rafting.jpg" alt="Whitewater rafters on the Snake River" />
          <figcaption>Whitewater rafters on the Snake River, where rapids range from Class III to Class V depending on water levels.</figcaption>
        </figure>

        <figure>
          <img src="/images/photos/kirkwood-ranch.jpg" alt="Kirkwood Ranch along the Snake River" />
          <figcaption>Kirkwood Ranch, a living history site maintained by the Forest Service and accessible only by water or trail.</figcaption>
        </figure>

        <figure>
          <img src="/images/photos/cache-creek.jpg" alt="Cache Creek Ranch" />
          <figcaption>Cache Creek Ranch, the Forest Service's primary administrative site inside the Hells Canyon Wilderness.</figcaption>
        </figure>

        <figure>
          <img src="/images/photos/landscape1.jpg" alt="Canyon ridgelines and terrain" />
          <figcaption>The arid, rugged terrain of the inner canyon gives way to forested slopes at higher elevations.</figcaption>
        </figure>

        <figure>
          <img src="/images/photos/landscape2.jpg" alt="Canyon landscape" />
          <figcaption>Canyon ridgelines stretch toward the horizon — the wilderness area covers over 650,000 acres.</figcaption>
        </figure>

        <figure>
          <img src="/images/photos/landscape-with-people1.jpg" alt="Hikers in the canyon" />
          <figcaption>Hikers taking in the scale of the inner canyon, where the walls dwarf everything below.</figcaption>
        </figure>

        <figure>
          <img src="/images/photos/mountain-goats.webp" alt="Mountain goats on rocky slopes" />
          <figcaption>Mountain goats navigating the rocky outcrops that line the upper canyon walls.</figcaption>
        </figure>

        <figure>
          <img src="/images/photos/cyclist.jpg" alt="Cyclist on the Hells Canyon Scenic Byway" />
          <figcaption>A cyclist on the Hells Canyon Scenic Byway, which winds 214 miles through northeastern Oregon.</figcaption>
        </figure>

        <figure>
          <img src="/images/photos/shire.jpg" alt="Horse on a canyon trail" />
          <figcaption>Pack trips by horse remain one of the oldest and most fitting ways to travel through the wilderness.</figcaption>
        </figure>

        <figure>
          <img src="/images/photos/old-landscape.JPG" alt="Early photograph of Hells Canyon" />
          <figcaption>An early photograph of the canyon — the landscape has changed little since the first settlers arrived.</figcaption>
        </figure>

      </section>
    </main>
  </body>
</html>
